<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Form</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <section>

        <div>
            <img src="./img/odin-lined.png" alt="Odin-Logo">
            <p>ODIN</p>
        </div>
        <footer>Photo by Halie West on Unsplash</footer>

    </section>
    <section>

        <article>

            <p>This is not a real online service! You know you need something like this in your life to help you realize
                your deepest dreams. Sign up now to get started.</p>
            <p>You know you want to.</p>

        </article>
        <div>
            <form action="#" method="post">
                <div>
                    <label for="">FIRST NAME</label>
                    <input type="text">
                </div>
                <div>
                    <label for="">LAST NAME</label>
                    <input type="text">
                </div>
                <div>
                    <label for="">EMAIL</label>
                    <input type="text">
                </div>
                <div>
                    <label for="">PHONE NUMBER</label>
                    <input type="text">
                </div>
                <div>
                    <label for="">PASSWORD</label>
                    <input type="text">
                </div>
                <div>
                    <label for="">CONFIRM PASSWORD</label>
                    <input type="text"> </input>
                </div>
            </form>
        </div>
        <div>
            <button>Create Account</button>
            <div>
                <p>Already have an account?</p>
                <a href="#">Log in</a>
            </div>
        </div>

    </section>
</body>

</html>
